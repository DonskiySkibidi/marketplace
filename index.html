    <div class="modal" id="cart-modal">
      <div class="modal-content">
        <button class="modal-close" id="cartClose">&times;</button>

        <h2>Корзина товаров</h2>

        <div class="cart-items" id="cart-items">
          <!-- <div class="cart-item">
            <img

        </div>

        <div class="cart-info">
          <div class="cart-totals">
            <p>Всего товаров: <span id="totalCountID">0 шт.</span></p>
            <p>Общая стоимость: <span id="totalSumID">0 руб.</span></p>
          </div>
          <button class="btn-checkout">Оформить заказ</button>
        </div>
      </div>
    </div>

    <div class="modal" id="addProductModal">
      <div class="modal-content">
        <button class="modal-close" id="createProductClose">&times;</button>
        <h2>Добавить товар</h2>
        <form id="addProductForm">
          <label for="product-name">Название товара:</label>
          <input
            type="text"
            id="product-name"
            name="product-name"
            placeholder="Введите название товара"
            required
          />
          <label for="product-count">Количество товара:</label>
          <input
            type="number"
            id="product-count"
            name="product-count"
            placeholder="Введите количество товара"
            min="0"
            required
          />

          <label for="product-price">Цена товара:</label>
          <input
            min="0"
            type="number"
            id="product-price"
            name="product-price"
            placeholder="Введите цену товара"
            required
          />

          <label for="product-image">Изображение товара:</label>
          <input
            type="file"
            id="product-image"
            name="product-image"
            accept="image/*"
            required
          />

          <button type="submit" id="addProduct" class="btn-checkout">
            Добавить товар
          </button>
        </form>
      </div>
